<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>$title</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" />
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #151a22;
      --text: #e8eaef;
      --muted: #8b93a7;
      --accent: $accent;
      --accent-dim: $accent_dim;
      --cool: #5c7cfa;
      --border: #2a3140;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: var(--text);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 120% 80% at 10% -20%, #1a2233 0%, transparent 55%),
        radial-gradient(ellipse 80% 50% at 90% 100%, #1f1528 0%, transparent 50%),
        var(--bg);
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }
    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 0.75rem;
    }
    .hero-sub {
      color: var(--muted);
      line-height: 1.6;
      max-width: 60ch;
      margin: 0;
    }
    .hero-sub a { color: var(--accent); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin: 1.75rem 0 2rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
    }
    .stat span {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
    }
    .stat strong {
      font-size: 1.35rem;
      font-variant-numeric: tabular-nums;
    }
    h2 {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.15rem;
      margin: 0 0 1rem;
      color: var(--muted);
      font-weight: 500;
    }
    .grid { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      align-items: start;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #3d4759; }
    .thumb {
      width: 120px;
      height: 90px;
      border-radius: 10px;
      overflow: hidden;
      background: #0e1218;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .ph {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .body h3 {
      margin: 0 0 0.35rem;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.35;
    }
    .body h3 a { color: var(--text); text-decoration: none; }
    .body h3 a:hover { color: var(--accent); }
    .meta { margin: 0; font-size: 0.85rem; color: var(--muted); }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: 0.65rem;
      flex-wrap: wrap;
    }
    .price {
      font-size: 1.2rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .pill {
      font-size: 0.8rem;
      padding: 0.25rem 0.55rem;
      border-radius: 8px;
      font-variant-numeric: tabular-nums;
    }
    .pill.hot { background: rgba(255, 107, 53, 0.18); color: var(--accent); }
    .pill.cool { background: rgba(92, 124, 250, 0.12); color: #9ab0ff; }
    .empty { color: var(--muted); }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 1rem; }
    .hint.ok { color: #7dd3a0; }
    .warn {
      font-size: 0.9rem;
      color: #fbbf77;
      margin: 1rem 0 0;
      line-height: 1.5;
    }
    footer { margin-top: 3rem; font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="badge">Preview SaaS compare</span>
      <h1>$h1</h1>
      <p class="hero-sub">$intro</p>
      $hero_hot
    </header>
    $filter_hint
    $rel
    $stats_block
    $empty
    $total_hint
    <h2>Annonces triées par « chaleur »</h2>
    <div class="grid">$cards</div>
    <footer>Données Leboncoin via lbc-api — prototype interne · $generated_at</footer>
  </div>
</body>
</html>
